<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shield background -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e5a96;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4db8a8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer shield -->
  <path d="M 100 30 L 155 65 L 155 120 Q 100 165 100 165 Q 100 165 45 120 L 45 65 Z" fill="url(#shieldGradient)" stroke="none"/>
  
  <!-- Inner shield -->
  <path d="M 100 45 L 140 70 L 140 115 Q 100 150 100 150 Q 100 150 60 115 L 60 70 Z" fill="none" stroke="url(#shieldGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Heart shape in center -->
  <path d="M 100 75 C 100 75 85 65 80 75 C 75 85 85 100 100 110 C 115 100 125 85 120 75 C 115 65 100 75 100 75" fill="none" stroke="url(#shieldGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Waveform pattern -->
  <path d="M 55 95 Q 60 90 65 95 T 75 95 T 85 95 T 95 95 L 105 85 L 115 105 L 125 90 L 135 100" 
        fill="none" stroke="url(#waveGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>